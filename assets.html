<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球資產 — Family Capital Platform</title>
<link rel="icon" href="img/favicon.ico" type="image/favicon.ico">
<link rel="icon" href="img/favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="market-ticker-wrap"><div class="market-ticker"><div class="market-ticker-inner" id="ticker-inner"></div></div></div>
    <div class="topbar">
      <span class="topbar-title">全球資產</span>
      <span class="topbar-meta" id="topbar-date"></span>
      <div class="topbar-user ms-3"><i class="fa-solid fa-circle-user"></i><span>陳○○</span></div>
    </div>
    <div class="page-body">
      <div class="breadcrumb-row">
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <span class="sep">/</span><span>全球資產</span>
      </div>

      <!-- ── KPI Row ── -->
      <div class="kpi-grid mb-3" id="kpi-row"></div>

      <!-- ── Map + Allocation ── -->
      <div class="row g-3 mb-3">
        <div class="col-12 col-lg-8">
          <div class="section-card">
            <div class="card-header-row">
              <div class="card-title"><i class="fa-solid fa-earth-americas me-1"></i>全球資產地圖分布</div>
            </div>
            <div id="world-map" style="height:380px;border-radius:12px;overflow:hidden;border:1px solid var(--border);isolation:isolate;"></div>
          </div>
        </div>
        <div class="col-12 col-lg-4">
          <div class="section-card h-100">
            <div class="card-title mb-3"><i class="fa-solid fa-chart-pie me-1"></i>資產類別分布</div>
            <div class="chart-container d-flex justify-content-center" style="height:200px;">
              <canvas id="chart-alloc"></canvas>
            </div>
            <div id="alloc-legend" class="mt-3"></div>
          </div>
        </div>
      </div>

      <!-- ── Holdings Table (tabs by portfolio) ── -->
      <div class="section-card mb-3">
        <div class="card-header-row">
          <div class="card-title"><i class="fa-solid fa-table me-1"></i>全部持倉明細</div>
          <div class="d-flex align-items-center gap-2 fs-12">
            <span class="badge-pledged">🔒 已質押</span>
            <span class="badge-free">✓ 未質押</span>
          </div>
        </div>
        <!-- Port tabs -->
        <div class="port-tabs mb-3">
          <button class="port-tab active" data-port="ALL" onclick="filterHoldings('ALL',this)">全部</button>
          <button class="port-tab" data-port="A" onclick="filterHoldings('A',this)">境外投組 A</button>
          <button class="port-tab" data-port="B" onclick="filterHoldings('B',this)">境內投組 B</button>
          <button class="port-tab" data-port="C" onclick="filterHoldings('C',this)">融資後資金 C</button>
        </div>
        <div class="overflow-auto">
          <table class="data-table" id="holdings-table">
            <thead><tr>
              <th>#</th>
              <th>持倉名稱</th>
              <th>類型</th>
              <th>投組</th>
              <th>地區</th>
              <th>對應銀行</th>
              <th>質押狀態</th>
              <th class="td-num">市值 (USD)</th>
              <th class="td-num">佔比</th>
              <th class="td-num">YTD (%)</th>
            </tr></thead>
            <tbody id="holdings-body"></tbody>
          </table>
        </div>
      </div>

      <!-- ── By Type Chart + By Bank Chart ── -->
      <div class="row g-3">
        <div class="col-12 col-sm-6">
          <div class="section-card">
            <div class="card-title mb-3"><i class="fa-solid fa-chart-bar me-1"></i>各類別市值</div>
            <div style="position:relative;height:220px;"><canvas id="chart-type"></canvas></div>
          </div>
        </div>
        <div class="col-12 col-sm-6">
          <div class="section-card">
            <div class="card-title mb-3"><i class="fa-solid fa-building-columns me-1"></i>各銀行 OBU 資產</div>
            <div style="position:relative;height:220px;"><canvas id="chart-bank"></canvas></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/mockdata.js"></script>
<script src="js/common.js"></script>
<script>
let allRows = [];

document.addEventListener('DOMContentLoaded', () => {
  renderShell('全球資產');
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });

  // Build combined holdings
  allRows = [
    ...MOCK.holdingsA.map(h => ({ ...h, port: 'A' })),
    ...MOCK.holdingsB.map(h => ({ ...h, port: 'B' })),
    ...MOCK.holdingsC.map(h => ({ ...h, port: 'C' }))
  ];

  // KPI
  const totalValue = allRows.reduce((s,h) => s + h.value, 0);
  const pledgedVal = allRows.filter(h => h.pledged).reduce((s,h) => s + h.value, 0);
  document.getElementById('kpi-row').innerHTML = [
    { label: '全球資產總值',   value: fmtUSD(totalValue),         icon: 'fa-coins',          color: '#0D2746' },
    { label: '境外投組 A',     value: fmtUSD(MOCK.aum.portA.value),icon: 'fa-globe',          color: '#0D2746' },
    { label: '境內投組 B',     value: fmtUSD(MOCK.aum.portB.value),icon: 'fa-flag',           color: '#2E6DB4' },
    { label: '融資後資金 C',   value: fmtUSD(MOCK.aum.portC.value),icon: 'fa-hand-holding-dollar',color:'#B8960C'},
    { label: '已質押資產',     value: fmtUSD(pledgedVal),          icon: 'fa-lock',           color: '#856404' }
  ].map(k => `
    <div class="stat-card">
      <div class="d-flex align-items-center gap-2 mb-1">
        <i class="fa-solid ${k.icon}" style="color:${k.color};font-size:16px;"></i>
        <span class="card-label mb-0">${k.label}</span>
      </div>
      <div class="card-value" style="font-size:20px;">${k.value}</div>
    </div>`).join('');

  renderHoldingsTable(allRows);

  // Alloc donut
  new Chart(document.getElementById('chart-alloc').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: MOCK.assetAllocation.map(a => a.label),
      datasets: [{ data: MOCK.assetAllocation.map(a => a.value), backgroundColor: MOCK.assetAllocation.map(a => a.color), borderWidth: 2, borderColor: '#fff' }]
    },
    options: { cutout: '62%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
  document.getElementById('alloc-legend').innerHTML = MOCK.assetAllocation.map(a =>
    `<div class="d-flex justify-content-between fs-12 mb-1">
       <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${a.color};margin-right:6px;"></span>${a.label}</span>
       <span class="fw-600">${a.value}%</span></div>`).join('');

  // Type bar chart
  const typeMap = {};
  allRows.forEach(h => { typeMap[h.type] = (typeMap[h.type] || 0) + h.value; });
  const typeLabels = Object.keys(typeMap);
  new Chart(document.getElementById('chart-type').getContext('2d'), {
    type: 'bar',
    data: {
      labels: typeLabels,
      datasets: [{ label: '市值 (USD)', data: typeLabels.map(t => typeMap[t]),
        backgroundColor: ['#0D2746','#2E6DB4','#4CA3DD','#7EC8E3','#BFE4F0'], borderRadius: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => '$' + (v/1e6).toFixed(0) + 'M' }, grid: { color: '#F3F5F8' } }, x: { grid: { display: false } } }
    }
  });

  // Bank bar chart
  new Chart(document.getElementById('chart-bank').getContext('2d'), {
    type: 'bar',
    data: {
      labels: MOCK.banks.map(b => b.name + ' OBU'),
      datasets: [{ label: 'OBU 資產 (USD)', data: MOCK.banks.map(b => b.obuAssets),
        backgroundColor: ['#0D2746','#2E6DB4','#4CA3DD','#7EC8E3'], borderRadius: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => '$' + (v/1e6).toFixed(0) + 'M' }, grid: { color: '#F3F5F8' } }, x: { grid: { display: false } } }
    }
  });

  // Leaflet map — single world copy, no horizontal repeat
  const map = L.map('world-map', {
    zoomControl:          true,
    scrollWheelZoom:      false,
    worldCopyJump:        false,
    maxBounds:            [[-85, -200], [85, 200]],
    maxBoundsViscosity:   1.0
  }).setView([25, 20], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 18,
    noWrap:  true
  }).addTo(map);

  // Map each holding ID → geo location (aggregate overlapping locations)
  const HOLDING_GEO = {
    'A-01': { key: 'us-east',   lat: 40.7,  lng: -74.1,  label: '美國（紐約）',   color: '#0D2746' },
    'A-02': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'A-03': { key: 'global',    lat: 51.5,  lng:  -0.1,  label: '全球/倫敦',     color: '#4CA3DD' },
    'A-04': { key: 'hk',        lat: 22.3,  lng: 114.2,  label: '香港/亞太',     color: '#5BB8E8' },
    'A-05': { key: 'singapore', lat:  1.3,  lng: 103.8,  label: '新加坡',        color: '#4CA3DD' },
    'A-06': { key: 'us-west',   lat: 37.4,  lng:-122.1,  label: '美國（矽谷）',  color: '#0D2746' },
    'A-07': { key: 'europe',    lat: 50.1,  lng:   8.7,  label: '歐洲（法蘭克福）', color: '#B8960C' },
    'A-08': { key: 'us-east',   lat: 40.7,  lng: -74.1,  label: '美國（紐約）',  color: '#0D2746' },
    'A-09': { key: 'global',    lat: 51.5,  lng:  -0.1,  label: '全球/倫敦',     color: '#4CA3DD' },
    'B-01': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'B-02': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'B-03': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'B-04': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'B-05': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'C-01': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'C-02': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'C-03': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'C-04': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
    'C-05': { key: 'taiwan',    lat: 25.0,  lng: 121.5,  label: '台灣',          color: '#2E6DB4' },
  };

  // Aggregate holdings value by location key
  const locMap = {};
  [...MOCK.holdingsA, ...MOCK.holdingsB, ...MOCK.holdingsC].forEach(h => {
    const geo = HOLDING_GEO[h.id];
    if (!geo) return;
    if (!locMap[geo.key]) {
      locMap[geo.key] = { lat: geo.lat, lng: geo.lng, label: geo.label,
                          color: geo.color, totalValue: 0, names: [] };
    }
    locMap[geo.key].totalValue += h.value;
    locMap[geo.key].names.push(h.name);
  });

  const geoPoints = Object.values(locMap);
  const maxVal = Math.max(...geoPoints.map(p => p.totalValue));
  const minVal = Math.min(...geoPoints.map(p => p.totalValue));
  const MIN_R = 8, MAX_R = 38;

  geoPoints.forEach(p => {
    const t      = (p.totalValue - minVal) / (maxVal - minVal);
    const radius = MIN_R + Math.sqrt(t) * (MAX_R - MIN_R);
    const nameList = p.names.slice(0, 3).join('<br>')
                   + (p.names.length > 3 ? `<br><span style="color:#9CA3AF">…等 ${p.names.length} 筆持倉</span>` : '');
    L.circleMarker([p.lat, p.lng], {
      radius, fillColor: p.color, color: '#fff', weight: 2, fillOpacity: 0.82
    }).bindPopup(
      `<div style="min-width:160px;font-family:'Noto Sans TC',sans-serif;">
         <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${p.label}</div>
         <div style="font-size:14px;color:#0D2746;font-weight:700;">$${(p.totalValue/1e6).toFixed(1)}M</div>
         <hr style="margin:6px 0;border-color:#eee;border-width:1px;">
         <div style="font-size:11px;color:#6B7280;line-height:1.7;">${nameList}</div>
       </div>`
    ).addTo(map);
  });
});

function renderHoldingsTable(rows) {
  document.getElementById('holdings-body').innerHTML = rows.map((h, i) => {
    const pledgeHtml = h.pledged !== undefined
      ? (h.pledged ? `<span class="badge-pledged">🔒 質押</span>` : `<span class="badge-free">✓ 自由</span>`)
      : '—';
    const bankHtml = h.bank ? `${h.bank}銀行` : '—';
    return `<tr>
      <td class="text-muted">${i+1}</td>
      <td class="fw-600">${h.name}</td>
      <td>${h.type}</td>
      <td>${portBadge(h.port)}</td>
      <td>${h.region}</td>
      <td class="fs-12">${bankHtml}</td>
      <td>${pledgeHtml}</td>
      <td class="td-num fw-600">${fmtUSD(h.value)}</td>
      <td class="td-num">${h.pct}%</td>
      <td class="td-num ${changeClass(h.change)}">${changeIcon(h.change)} ${Math.abs(h.change).toFixed(1)}%</td>
    </tr>`;
  }).join('');
}

function filterHoldings(port, btn) {
  document.querySelectorAll('.port-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = port === 'ALL' ? allRows : allRows.filter(h => h.port === port);
  renderHoldingsTable(filtered);
}
</script>
</body>
</html>
