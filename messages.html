<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訊息中心 — Family Capital Platform</title>
<link rel="icon" href="img/favicon.ico" type="image/favicon.ico">
<link rel="icon" href="img/favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="market-ticker-wrap"><div class="market-ticker"><div class="market-ticker-inner" id="ticker-inner"></div></div></div>
    <div class="topbar">
      <span class="topbar-title">訊息中心</span>
      <span class="topbar-meta" id="topbar-date"></span>
      <div class="topbar-user ms-3"><i class="fa-solid fa-circle-user"></i><span>陳○○</span></div>
    </div>
    <div class="page-body">
      <div class="breadcrumb-row">
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <span class="sep">/</span><span>訊息中心</span>
      </div>

      <div class="row g-3">
        <!-- Message list -->
        <div class="col-12 col-lg-5">
          <div class="section-card" style="padding:0;">
            <div class="card-header-row" style="padding:16px 18px 12px;">
              <div class="card-title"><i class="fa-solid fa-inbox me-1"></i>訊息列表</div>
              <div class="d-flex gap-2 align-items-center">
                <span class="badge-warning fs-12" id="unread-count"></span>
                <button class="btn btn-sm" style="border:1px solid var(--border);border-radius:7px;font-size:11px;" onclick="markAllRead()">全部已讀</button>
              </div>
            </div>
            <!-- Filter tabs -->
            <div class="d-flex gap-0" style="border-bottom:1px solid var(--border);padding:0 12px;">
              <button class="btn btn-sm px-3 py-2" style="border-bottom:2px solid #0D2746;border-radius:0;font-size:12px;color:#0D2746;font-weight:700;" id="tab-all" onclick="filterMsg('all',this)">全部</button>
              <button class="btn btn-sm px-3 py-2" style="border-bottom:2px solid transparent;border-radius:0;font-size:12px;color:#6B7280;" id="tab-unread" onclick="filterMsg('unread',this)">未讀</button>
              <button class="btn btn-sm px-3 py-2" style="border-bottom:2px solid transparent;border-radius:0;font-size:12px;color:#6B7280;" id="tab-alert" onclick="filterMsg('alert',this)">警示</button>
            </div>
            <div id="msg-list"></div>
          </div>
        </div>

        <!-- Message detail -->
        <div class="col-12 col-lg-7">
          <div class="section-card h-100" id="msg-detail">
            <div style="display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:var(--muted);">
              <i class="fa-solid fa-envelope-open fa-3x" style="opacity:0.3;"></i>
              <div class="fs-13">請選擇左側訊息查閱詳情</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/mockdata.js"></script>
<script src="js/common.js"></script>
<script>
const iconMap = {
  alert:   { icon: 'fa-circle-exclamation', cls: 'alert'   },
  warning: { icon: 'fa-triangle-exclamation',cls: 'warning' },
  info:    { icon: 'fa-circle-info',         cls: 'info'    },
  success: { icon: 'fa-circle-check',        cls: 'success' }
};

let messages = MOCK.messages.map(m => ({ ...m }));
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  renderShell('訊息中心');
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });
  renderMessages();
});

function renderMessages() {
  const unread = messages.filter(m => !m.read).length;
  const uc = document.getElementById('unread-count');
  uc.textContent = unread + ' 未讀';
  uc.style.display = unread > 0 ? '' : 'none';

  let filtered = messages;
  if (currentFilter === 'unread') filtered = messages.filter(m => !m.read);
  if (currentFilter === 'alert')  filtered = messages.filter(m => m.type === 'alert' || m.type === 'warning');

  document.getElementById('msg-list').innerHTML = filtered.map(m => {
    const im = iconMap[m.type] || iconMap.info;
    return `<div class="msg-item ${m.read ? '' : 'unread'}" onclick="readMessage('${m.id}')">
      <div class="msg-icon ${im.cls}"><i class="fa-solid ${im.icon}"></i></div>
      <div class="flex-1 min-w-0">
        <div class="d-flex justify-content-between align-items-start">
          <div class="fs-13 fw-600 ${m.read ? '' : 'text-primary'}" style="color:${m.read?'':'#0D2746'}">${m.title}</div>
          ${!m.read ? '<span style="width:8px;height:8px;border-radius:50%;background:#0D2746;flex-shrink:0;margin-top:4px;"></span>' : ''}
        </div>
        <div class="fs-12 text-muted mt-1" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.content}</div>
        <div class="fs-11 text-muted mt-1">${m.date}</div>
      </div>
    </div>`;
  }).join('') || '<div class="fs-12 text-muted p-4 text-center">無符合條件的訊息</div>';
}

function readMessage(id) {
  const msg = messages.find(m => m.id === id);
  if (!msg) return;
  msg.read = true;
  renderMessages();

  const im = iconMap[msg.type] || iconMap.info;
  const typeLabel = { alert:'警示', warning:'提醒', info:'通知', success:'確認' };
  document.getElementById('msg-detail').innerHTML = `
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="msg-icon ${im.cls}" style="width:48px;height:48px;font-size:20px;border-radius:12px;">
        <i class="fa-solid ${im.icon}"></i>
      </div>
      <div>
        <div class="fw-700" style="font-size:16px;">${msg.title}</div>
        <div class="fs-12 text-muted mt-1">
          <span class="badge-info me-2">${typeLabel[msg.type]||msg.type}</span>
          ${msg.date}
        </div>
      </div>
    </div>
    <div style="font-size:14px;line-height:1.7;color:var(--text);border-top:1px solid var(--border);padding-top:16px;">
      ${msg.content}
    </div>
    <div class="mt-4 d-flex gap-2">
      ${msg.type === 'alert' || msg.type === 'warning'
        ? `<a href="credit.html" class="btn btn-sm" style="background:#0D2746;color:#fff;border-radius:8px;">
             <i class="fa-solid fa-arrow-right me-1"></i>前往處理
           </a>` : ''}
      <button class="btn btn-sm btn-outline-secondary" style="border-radius:8px;" onclick="deleteMessage('${msg.id}')">
        <i class="fa-solid fa-trash-can me-1"></i>刪除
      </button>
    </div>`;
}

function markAllRead() {
  messages.forEach(m => m.read = true);
  renderMessages();
  document.getElementById('msg-detail').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:var(--muted);"><i class="fa-solid fa-check-circle fa-3x" style="color:#28A745;opacity:0.6;"></i><div class="fs-13">所有訊息已標記為已讀</div></div>';
}

function deleteMessage(id) {
  messages = messages.filter(m => m.id !== id);
  renderMessages();
  document.getElementById('msg-detail').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px;color:var(--muted);"><i class="fa-solid fa-envelope-open fa-3x" style="opacity:0.3;"></i><div class="fs-13">訊息已刪除</div></div>';
}

function filterMsg(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.port-tabs .btn, [id^=tab-]').forEach(b => {
    if (b.id && b.id.startsWith('tab-')) {
      b.style.borderBottom = '2px solid transparent';
      b.style.color = '#6B7280';
      b.style.fontWeight = '';
    }
  });
  btn.style.borderBottom = '2px solid #0D2746';
  btn.style.color = '#0D2746';
  btn.style.fontWeight = '700';
  renderMessages();
}
</script>
</body>
</html>
