<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市場行情 — Family Capital Platform</title>
<link rel="icon" href="img/favicon.ico" type="image/favicon.ico">
<link rel="icon" href="img/favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="market-ticker-wrap"><div class="market-ticker"><div class="market-ticker-inner" id="ticker-inner"></div></div></div>
    <div class="topbar">
      <span class="topbar-title">市場行情</span>
      <span class="topbar-meta" id="topbar-date"></span>
      <div class="topbar-user ms-3"><i class="fa-solid fa-circle-user"></i><span>陳○○</span></div>
    </div>
    <div class="page-body">
      <div class="breadcrumb-row">
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <span class="sep">/</span><span>市場行情</span>
      </div>

      <!-- Tab bar -->
      <div class="port-tabs mb-3">
        <button class="port-tab active" data-tab="tw"     onclick="switchTab('tw',this)">台灣市場</button>
        <button class="port-tab"        data-tab="global" onclick="switchTab('global',this)">全球市場</button>
        <button class="port-tab"        data-tab="fx"     onclick="switchTab('fx',this)">外匯 / 商品</button>
      </div>

      <!-- ── Taiwan Tab ── -->
      <div id="tab-tw">
        <!-- Sub-tabs -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
          <button class="btn btn-sm" style="background:#0D2746;color:#fff;border-radius:8px;" onclick="filterTW('all',this)">全部</button>
          <button class="btn btn-sm btn-outline-secondary" style="border-radius:8px;" onclick="filterTW('股票',this)">個股</button>
          <button class="btn btn-sm btn-outline-secondary" style="border-radius:8px;" onclick="filterTW('ETF',this)">ETF</button>
          <button class="btn btn-sm btn-outline-secondary" style="border-radius:8px;" onclick="filterTW('半導體',this)">半導體</button>
          <button class="btn btn-sm btn-outline-secondary" style="border-radius:8px;" onclick="filterTW('生技',this)">生技</button>
        </div>

        <div class="row g-3 mb-3" id="tw-cards"></div>

        <div class="section-card">
          <div class="card-title mb-3"><i class="fa-solid fa-chart-bar me-1"></i>台股走勢（模擬月線）</div>
          <div style="position:relative;height:200px;"><canvas id="chart-tw"></canvas></div>
        </div>
      </div>

      <!-- ── Global Tab ── -->
      <div id="tab-global" style="display:none;">
        <div class="row g-3 mb-3" id="global-cards"></div>
        <div class="section-card">
          <div class="card-title mb-3"><i class="fa-solid fa-chart-line me-1"></i>主要指數月線</div>
          <div style="position:relative;height:200px;"><canvas id="chart-global"></canvas></div>
        </div>
      </div>

      <!-- ── FX/Commodity Tab ── -->
      <div id="tab-fx" style="display:none;">
        <div class="row g-3" id="fx-cards"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/mockdata.js"></script>
<script src="js/common.js"></script>
<script>
const GLOBAL_INDICES = [
  { name: 'S&P 500',    value: 5248,  change: 0.43,  ytd: 11.2 },
  { name: 'Nasdaq',     value: 16742, change: 0.67,  ytd: 15.8 },
  { name: 'MSCI World', value: 3412,  change: 0.22,  ytd: 8.6  },
  { name: '日經225',    value: 38420, change: 1.12,  ytd: 18.4 },
  { name: '恒生指數',   value: 17850, change: -0.45, ytd: -5.2 },
  { name: '加權指數',   value: 21420, change: 0.85,  ytd: 14.3 }
];
const FX = [
  { name: 'USD/TWD', value: 31.82, change: -0.12 },
  { name: 'EUR/USD', value: 1.085, change:  0.08 },
  { name: 'USD/JPY', value: 149.2, change:  0.25 },
  { name: 'USD/SGD', value: 1.338, change: -0.04 },
  { name: '黃金 (XAU)', value: 2342, change: 0.28 },
  { name: '布倫特原油', value: 82.4, change: -0.55 },
  { name: '銅 ($/MT)',  value: 8820, change: 1.12 }
];

let allTW = [];

document.addEventListener('DOMContentLoaded', () => {
  renderShell('市場行情');
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });

  allTW = MOCK.taiwanStocks;
  renderTWCards(allTW);

  // TW chart (simulated monthly)
  const months = ['1月','2月','3月','4月','5月'];
  const twLineData = [19800, 20150, 20420, 21100, 21420];
  new Chart(document.getElementById('chart-tw').getContext('2d'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [{ label: '加權指數', data: twLineData, borderColor: '#0D2746', backgroundColor: 'rgba(13,39,70,0.07)', tension: 0.4, fill: true, borderWidth: 2, pointRadius: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => v.toLocaleString() }, grid: { color: '#F3F5F8' } }, x: { grid: { display: false } } }
    }
  });

  // Global cards
  document.getElementById('global-cards').innerHTML = GLOBAL_INDICES.map(g => `
    <div class="col-6 col-sm-4 col-lg-2">
      <div class="stat-card text-center">
        <div class="card-label">${g.name}</div>
        <div class="card-value" style="font-size:18px;">${fmt(g.value, g.value < 100 ? 2 : 0)}</div>
        <div class="${changeClass(g.change)} fw-600 fs-13 mt-1">${changeIcon(g.change)} ${Math.abs(g.change).toFixed(2)}%</div>
        <div class="fs-12 text-muted mt-1">YTD ${fmtPct(g.ytd)}</div>
      </div>
    </div>`).join('');

  // Global chart
  const gLabels = ['1月','2月','3月','4月','5月'];
  const sp500 = [4700, 4820, 4950, 5100, 5248];
  const nasdaq = [14800, 15200, 15800, 16200, 16742];
  new Chart(document.getElementById('chart-global').getContext('2d'), {
    type: 'line',
    data: {
      labels: gLabels,
      datasets: [
        { label: 'S&P 500', data: sp500, borderColor: '#0D2746', tension: 0.4, borderWidth: 2, pointRadius: 3, yAxisID: 'y' },
        { label: 'Nasdaq',  data: nasdaq, borderColor: '#2E6DB4', tension: 0.4, borderWidth: 2, pointRadius: 3, yAxisID: 'y2' }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: {
        y:  { position: 'left',  ticks: { callback: v => v.toLocaleString() }, grid: { color: '#F3F5F8' } },
        y2: { position: 'right', ticks: { callback: v => v.toLocaleString() }, grid: { display: false } },
        x: { grid: { display: false } }
      }
    }
  });

  // FX cards
  document.getElementById('fx-cards').innerHTML = FX.map(f => `
    <div class="col-6 col-sm-4 col-lg-3">
      <div class="stat-card">
        <div class="card-label">${f.name}</div>
        <div class="card-value" style="font-size:20px;">${fmt(f.value, f.value < 10 ? 3 : 0)}</div>
        <div class="${changeClass(f.change)} fw-600 fs-13 mt-1">${changeIcon(f.change)} ${Math.abs(f.change).toFixed(2)}%</div>
      </div>
    </div>`).join('');
});

function renderTWCards(stocks) {
  document.getElementById('tw-cards').innerHTML = stocks.map(s => `
    <div class="col-6 col-sm-4 col-xl-2">
      <div class="stat-card">
        <div class="card-label">${s.code}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">${s.name}</div>
        <div class="card-value" style="font-size:20px;">NT$${fmt(s.price, 0)}</div>
        <div class="${changeClass(s.change)} fw-600 fs-13 mt-1">${changeIcon(s.change)} ${Math.abs(s.change).toFixed(2)}%</div>
        <div class="d-flex justify-content-between mt-2 fs-12 text-muted">
          <span>市值: ${s.mktCap}</span>
          ${s.pe ? `<span>P/E: ${s.pe}</span>` : '<span>ETF</span>'}
        </div>
      </div>
    </div>`).join('');
}

function filterTW(filter, btn) {
  document.querySelectorAll('#tab-tw .btn').forEach(b => {
    b.style.background = ''; b.style.color = '';
    b.className = 'btn btn-sm btn-outline-secondary';
    b.style.borderRadius = '8px';
  });
  btn.className = 'btn btn-sm';
  btn.style.background = '#0D2746'; btn.style.color = '#fff'; btn.style.borderRadius = '8px';

  if (filter === 'all') { renderTWCards(allTW); return; }
  const filtered = allTW.filter(s => s.sector === filter || s.type === filter);
  renderTWCards(filtered.length ? filtered : allTW.filter(s =>
    filter === 'ETF' ? s.code.includes('ETF') : s.sector === filter));
}

function switchTab(tab, btn) {
  document.querySelectorAll('.port-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['tw','global','fx'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? '' : 'none';
  });
}
</script>
</body>
</html>
